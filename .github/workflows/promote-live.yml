name: Promote Tested Build to Live

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Re-run release gate
        run: node tests/smoke-test.mjs test

  promote:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Promote tested assets
        run: cp test/index.html index.html && cp test/manifest.json manifest.json && cp test/icon.svg icon.svg && cp test/sw.js sw.js
      - name: Record promoted release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html manifest.json icon.svg sw.js
          git diff --cached --quiet || git commit -m "Promote tested build to live"
          git push
      - uses: actions/configure-pages@v5
      - name: Assemble promoted site
        run: |
          mkdir -p _site/test
          cp index.html manifest.json icon.svg sw.js _site/
          cp test/index.html test/manifest.json test/icon.svg test/sw.js _site/test/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy production
        id: deployment
        uses: actions/deploy-pages@v4
